services:
  postgres:
    image: postgres:16-alpine
    container_name: farm-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-farm}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-farm}
      POSTGRES_DB: ${POSTGRES_DB:-farm_bundle_tracker}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-farm} -d ${POSTGRES_DB:-farm_bundle_tracker}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  backend:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile.dev
    container_name: farm-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: development
      PORT: ${BACKEND_PORT:-3000}
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_USER: ${POSTGRES_USER:-farm}
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD:-farm}
      DATABASE_NAME: ${POSTGRES_DB:-farm_bundle_tracker}
      DATABASE_URL: postgresql://${POSTGRES_USER:-farm}:${POSTGRES_PASSWORD:-farm}@postgres:5432/${POSTGRES_DB:-farm_bundle_tracker}
    ports:
      - "${BACKEND_PORT:-3000}:3000"
    volumes:
      - ./apps/backend:/app
      - backend_node_modules:/app/node_modules
    command: npm run start:dev

  frontend:
    build:
      context: ./apps/frontend
      dockerfile: Dockerfile.dev
    container_name: farm-frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:3000}
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    volumes:
      - ./apps/frontend:/app
      - frontend_node_modules:/app/node_modules
    command: npm run dev -- --host 0.0.0.0 --port 5173

volumes:
  postgres_data:
  backend_node_modules:
  frontend_node_modules:
